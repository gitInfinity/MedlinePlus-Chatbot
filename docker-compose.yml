# docker-compose.yml - Defines the multi-container Docker application for the MedlinePlus Chatbot, including backend, frontend, MLflow, and Ollama services

services:
  backend:
    build: 
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - hf_cache:/root/.cache/huggingface  
    environment:
      - OLLAMA_HOST=http://ollama:11434/v1
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_EXPERIMENT_NAME=Medline_RAG
    depends_on:
      - ollama
    networks:
      - medline-net

  mlflow:
    image: ghcr.io/mlflow/mlflow
    container_name: mlflow_ui
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow_data:/app/mlflow_data 
    working_dir: /app
    # Force 1 worker to avoid the Windows/Uvicorn crash we saw earlier
    command: >
      mlflow server 
      --host 0.0.0.0 
      --port 5000 
      --backend-store-uri sqlite:////app/mlflow_data/mlflow.db 
      --registry-store-uri sqlite:////app/mlflow_data/mlflow.db
      --default-artifact-root /app/mlflow_data/artifacts
      --allowed-hosts '*'
      --cors-allowed-origins '*'
    networks:
      - medline-net

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - medline-net

  ollama:
    # ... (keep your existing ollama config, it's perfect)
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - medline-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  medline-net:

volumes:
  ollama_data:
  hf_cache: